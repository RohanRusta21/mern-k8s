apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ttl.sh/backend-mern-10:23h  # Replace with your image
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: backend-cm
              key: MONGO_URI
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-cm
              key: PORT

---
apiVersion: v1
kind: Service
metadata:
  name: backend  # This name is used in Ingress routing
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-cm
data:
  MONGO_URI: "mongodb://mongodb.default.svc.cluster.local:27017/mern-sts-todo"
  PORT: "5000"



 