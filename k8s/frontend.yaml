apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ttl.sh/frontend-mern-10:23h  # Replace with your image
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_BASE_URL
          value: "http://backend.default.svc.cluster.local:5000/api/todos"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend  # This name is used in Ingress routing
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP