apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ttl.sh/frontend-mern-1:23h  # Replace with your image
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend  # This name is used in Ingress routing
  namespace: traefik
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  #type: ClusterIP  #ClusterIP
