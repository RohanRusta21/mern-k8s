apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: traefik
spec:
  selector:
    matchLabels:
      app: mongodb
  serviceName: "mongodb"
  replicas: 3
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongodb
        image: docker.io/mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: mern-sts-todo
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb  # This name is used in MONGO_URI
  namespace: traefik
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
